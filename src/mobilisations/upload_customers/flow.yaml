name: "upload_customers"
start_id: "intro"

steps:
  - id: "intro"
    messages:
      - "Great, thank you {{user_first_name}}."
      - "Having up-to-date knowledge of your existing customers really helps our team find new ones — and makes sure we don't accidentally target people who already work with you."
      - "You can upload a CSV, add customers one by one, or skip this for now."
    type: "option_set"
    options:
      - id: 1
        message: "Upload CSV"
        next_id: "upload_csv_sidebar"
      - id: 2
        message: "Add manually"
        next_id: "add_manually_sidebar"
      - id: 3
        message: "Do it later"
        next_id: "complete"

  - id: "upload_csv_sidebar"
    type: "sidebar"
    sidebar: "upload_csv"
    next_id: "complete"

  - id: "add_manually_sidebar"
    type: "sidebar"
    sidebar: "add_manually_customers"
    next_id: "complete"

  - id: "complete"
    messages:
      - "Perfect. Leave it with us."
    type: "end_flow"

on_complete:
  db_updates:
    - table: "user_details"
      match_field: "id"
      match_value: "@user_details_id"
      set:
        signup_complete: true
  condition:
    step: "intro"
    value: "Do it later"
    negate: true
    on_fail:
      broadcast_mobilisation: "signup_ideal_target_profile"
      queue_mobilisation: "signup_ideal_target_profile"
  employee: "business_analyst"
  skill: "analyse_customers"
  inputs: {}
