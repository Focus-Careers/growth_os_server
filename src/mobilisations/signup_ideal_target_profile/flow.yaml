name: "signup_ideal_target_profile"
start_id: "start_itp"

steps:
  - id: "start_itp"
    messages:
      - "Perfect. Now let's build your ideal target profile."
      - "Warren will use everything we know about your organisation and customers to define who you should be targeting."
      - "Ready?"
    type: "option_set"
    options:
      - id: 1
        message: "Ready 🚀"
    next_id: "complete"

  - id: "complete"
    messages:
    - "Great — Warren is putting your ideal target profile together now. Give him a moment."
    type: "end_flow"

on_complete:
  employee: "business_analyst"
  skill: "define_itp"
  inputs:
    organisation_name: "@account.organisation_name"
    organisation_website: "@account.organisation_website"
    description: "@account.description"
    problem_solved: "@account.problem_solved"
