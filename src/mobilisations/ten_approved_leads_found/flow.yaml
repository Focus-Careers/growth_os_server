name: "ten_approved_leads_found"
start_id: "ten_approved"

steps:
  - id: "ten_approved"
    type: "option_set"
    messages:
      - "Great news — your ITP is looking solid. We've got 10 approved targets with contact details, which means your ideal target profile is dialled in."
      - "The next step is to set up your first email campaign. I'll get Draper on it — we just need a few details from you."
      - "Ready to create your campaign?"
    options:
      - id: 1
        message: "Let's do it"
        next_id: "complete"
      - id: 2
        message: "Not right now"
        next_id: "later"

  - id: "complete"
    type: "end_flow"
    messages:
      - "Great — let's get started."

  - id: "later"
    type: "end_flow"
    messages:
      - "No worries. Just let me know when you're ready to set up a campaign."

on_complete:
  condition:
    step: "ten_approved"
    value: "Let's do it"
  mobilisation: "initiate_create_campaign"
