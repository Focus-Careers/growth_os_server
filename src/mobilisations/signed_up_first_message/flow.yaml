name: "signed_up_first_message"
start_id: "time_to_start"

steps:
  - id: "time_to_start"
    messages:
      - "It's time to start marketing."
      - "Any specific ideas you want to focus on first - or should I take the lead?"
    type: "free_type"
    next_id: "complete"

  - id: "complete"
    messages: []
    type: "end_flow"

on_complete:
  db_updates:
    - table: "user_details"
      match_field: "id"
      match_value: "@user_details_id"
      set:
        signup_complete: true
