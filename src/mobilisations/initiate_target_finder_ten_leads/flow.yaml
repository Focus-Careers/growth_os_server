name: "initiate_target_finder_ten_leads"
start_id: "initial_message"

steps:
  - id: "initial_message"
    type: "ai_message_with_options"
    prompt_file: "initial_prompt.md"
    options:
      - id: 1
        message: "Yes - sounds good."
        next_id: "sidebar"
      - id: 2
        message: "Not right now."
        next_id: "complete-not-right-now"

  - id: "sidebar"
    type: "sidebar"
    sidebar: "select_itp"
    messages:
      - "Perfect. Let's start off by choosing one of your ITP's (ideal target profiles). We'll be finding targets that match this profile."
    next_id: "complete"

  - id: "complete-not-right-now"
    messages:
      - "No worries. We can come back to that. Is there something else you want to try?"
    type: "free_type"
    next_id: "complete"

  - id: "complete"
    type: "end_flow"
    messages:
      - "{{user_first_name}} — thanks for the info. I'm getting Belfort to search for target companies that match your profile now."
      - "I'll let you know when the results are ready. You'll be able to approve the ones that look right, and reject any that don't fit — your feedback helps us refine the targeting."

on_complete:
  employee: "lead_gen_expert"
  skill: "target_finder_ten_leads"
  inputs: {}
